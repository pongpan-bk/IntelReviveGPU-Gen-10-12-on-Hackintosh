name: Build MyIntelGPU.kext

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    name: Build Kernel Extension
    runs-on: macos-14

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Download and Setup MacKernelSDK
      run: |
        curl -fSL https://github.com/acidanthera/MacKernelSDK/archive/refs/heads/master.tar.gz \
          -o /tmp/MacKernelSDK.tar.gz
        mkdir -p "${{ github.workspace }}/MacKernelSDK"
        tar -xzf /tmp/MacKernelSDK.tar.gz \
          -C "${{ github.workspace }}/MacKernelSDK" --strip-components=1
        echo "KERNEL_SDK_DIR=${{ github.workspace }}/MacKernelSDK" >> $GITHUB_ENV

    - name: Compile Kext via Makefile
      run: |
        make KERNEL_SDK_DIR="${{ github.workspace }}/MacKernelSDK" 2>&1 | tee /tmp/build.log

    - name: Verify Kext Binary Output
      run: |
        if [ ! -f "MyIntelGPU.kext/Contents/MacOS/MyIntelGPU" ]; then
          echo "❌ Build failed — binary not found"
          cat /tmp/build.log
          exit 1
        fi
        echo "✅ Build success!"
        ls -la MyIntelGPU.kext/Contents/MacOS/MyIntelGPU

    - name: Upload Kext to GitHub Artifacts
      if: success()
      uses: actions/upload-artifact@v4
      with:
        name: MyIntelGPU.kext
        path: MyIntelGPU.kext/
        if-no-files-found: error
        retention-days: 7

    - name: Upload Build Log
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: build-log
        path: /tmp/build.log
        retention-days: 7

    - name: Publish Build Error as Issue
      if: failure()
      env:
        GH_TOKEN: ${{ github.token }}
      run: |
        LOG=$(cat /tmp/build.log)
        gh issue create \
          --title "CI Build Failure #${{ github.run_number }}" \
          --body "Build failed on commit ${{ github.sha }}
        \`\`\`
        $LOG
        \`\`\`
        " \
          --label "build-failure" 2>&1 || echo "gh issue create failed, trying alternate method"


